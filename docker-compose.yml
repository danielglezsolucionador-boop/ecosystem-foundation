services:
  postgres:
    image: postgres:16-alpine
    container_name: ecosystem-foundation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecosystem_local
      POSTGRES_PASSWORD: ecosystem_local
      POSTGRES_DB: ecosystem_foundation_local
    ports:
      - "55432:5432"
    volumes:
      - ecosystem_foundation_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosystem_local -d ecosystem_foundation_local"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  ecosystem_foundation_postgres:
