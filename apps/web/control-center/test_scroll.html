<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Scroll Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .chat-container {
            width: 350px;
            height: 500px; /* Altura fija para garantizar el test */
            background: #111;
            border: 1px solid #d4af37;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 15px;
            color: #d4af37;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        
        .chat-messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 999px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 999px; }
        
        .msg {
            padding: 10px;
            border-radius: 8px;
            background: #222;
            max-width: 80%;
        }
        
        .chat-input {
            padding: 15px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        
        input {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #d4af37;
            border-radius: 20px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">CHAT CON CEREBRO</div>
        <div class="chat-messages" id="chatArea">
            <div class="msg">CEREBRO: Hola CEO. Este es un mensaje de prueba.</div>
            <div class="msg">CEREBRO: Escribe para agregar más.</div>
            <div class="msg">CEREBRO: Mensaje 3.</div>
            <div class="msg">CEREBRO: Mensaje 4.</div>
            <div class="msg">CEREBRO: Mensaje 5.</div>
            <div class="msg">CEREBRO: Mensaje 6.</div>
            <div class="msg">CEREBRO: Mensaje 7.</div>
            <div class="msg">CEREBRO: Mensaje 8. ¿Ves la barra dorada a la derecha?</div>
        </div>
        <div class="chat-input">
            <input type="text" placeholder="Escribe aquí...">
        </div>
    </div>

</body>
</html>
